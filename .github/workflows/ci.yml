name: CI
 
on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "main"]
 
jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest
 
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        django-version: ["4.2", "5.0", "5.1", "6.0"]
        exclude:
          # Django 6.0 requires Python 3.12+.
          - python-version: "3.10"
            django-version: "6.0"
          - python-version: "3.11"
            django-version: "6.0"
          # Python 3.14 requires Django 6.0+ — earlier Django has a
          # Context.__copy__ incompatibility. See README §Compatibility.
          - python-version: "3.14"
            django-version: "4.2"
          - python-version: "3.14"
            django-version: "5.0"
          - python-version: "3.14"
            django-version: "5.1"
 
    steps:
      - uses: actions/checkout@v6
 
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django==${{ matrix.django-version }}.*"
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest
 
  changelog:
    name: CHANGELOG has entry for current version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert CHANGELOG.md has a section for the pyproject.toml version
        run: |
          version=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          if [ -z "$version" ]; then
            echo "Could not parse version from pyproject.toml"
            exit 1
          fi
          if ! grep -qF "## [$version]" CHANGELOG.md; then
            echo "CHANGELOG.md has no '## [$version]' section."
            echo "Add an entry for $version (Keep-a-Changelog format) before tagging."
            exit 1
          fi

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: publish
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        run: twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
